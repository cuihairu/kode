name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout 代码
      timeout-minutes: 3
      uses: actions/checkout@v4

    - name: 安装 pnpm
      timeout-minutes: 3
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: 设置 Node.js 20.x
      timeout-minutes: 5
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'

    - name: 配置 GitHub Pages
      timeout-minutes: 3
      uses: actions/configure-pages@v5

    - name: 安装依赖
      timeout-minutes: 5
      run: pnpm install --frozen-lockfile

    - name: 构建文档
      timeout-minutes: 15
      run: pnpm run docs:build

    - name: 上传 Pages Artifact
      timeout-minutes: 3
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: 部署到 GitHub Pages
      timeout-minutes: 10
      id: deployment
      uses: actions/deploy-pages@v4
